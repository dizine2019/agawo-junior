<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AgawoJunior Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-900 via-blue-700 to-blue-500 min-h-screen flex items-center justify-center">

    <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-2xl">

        <h1 class="text-3xl font-bold text-center text-blue-700 mb-2">
            AgawoJunior
        </h1>

        <p class="text-center text-gray-500 mb-6">
            School Management System
        </p>

        {% if error %}
        <div class="bg-red-100 text-red-600 p-2 rounded mb-4 text-sm text-center">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
                class="w-full p-3 border rounded-lg mb-4 focus:ring-2 focus:ring-blue-400">

            <input type="password" name="password" placeholder="Password"
                class="w-full p-3 border rounded-lg mb-6 focus:ring-2 focus:ring-blue-400">

            <button class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">
                Login
            </button>
        </form>

    </div>

</body>
</html>
