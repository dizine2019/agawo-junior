<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
			<!-- THIS LINE FIXES THE SHAKY MOBILE ISSUE -->
			<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

				<title>AgawoJunior Login</title>
				<script src="https://cdn.tailwindcss.com"></script>
				<style>
					/* Prevents the background from jumping when the mobile keyboard appears */
					body {
					height: 100%;
					overflow-y: auto;
					}
				</style>
			</head>

	<body class="bg-gradient-to-br from-blue-900 via-blue-700 to-blue-500 min-h-screen flex items-center justify-center p-4">

		<!-- Added 'mx-auto' and adjusted padding for better mobile feel -->
		<div class="bg-white w-full max-w-md p-6 sm:p-8 rounded-2xl shadow-2xl mx-auto">

			<h1 class="text-3xl font-bold text-center text-blue-700 mb-2">
				AgawoJunior
			</h1>

			<p class="text-center text-gray-500 mb-6 text-sm sm:text-base">
				School Management System
			</p>

			{% if error %}
			<div class="bg-red-100 text-red-600 p-3 rounded-lg mb-4 text-sm text-center font-medium">
				{{ error }}
			</div>
			{% endif %}

			<form method="POST">
				{% csrf_token %}

				<!-- Added 'appearance-none' to prevent mobile browser styling issues -->
				<input type="text" name="username" placeholder="Username" required=""
					class="w-full p-4 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base appearance-none">

					<input type="password" name="password" placeholder="Password" required=""
						class="w-full p-4 border border-gray-300 rounded-lg mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500 text-base appearance-none">

						<button type="submit"
							class="w-full bg-blue-600 text-white py-4 rounded-lg font-bold hover:bg-blue-700 active:scale-95 transition-transform duration-150 shadow-lg">
							Login
						</button>
					</form>

			<p class="text-center text-gray-400 text-xs mt-8">
				&copy; 2024 AgawoJunior Systems
			</p>

		</div>

	</body>
</html>
