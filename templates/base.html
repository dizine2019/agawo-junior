<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agawo Junior School</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Roboto', Arial, sans-serif;
}

body{
    display:flex;
    min-height:100vh;
    background:#f0f2f5;
    color:#333;
}

/* ================= SIDEBAR ================= */
.sidebar{
    width:240px;
    background: linear-gradient(180deg, #0d47a1, #42a5f5);
    color:#fff;
    padding:20px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    box-shadow: 2px 0 12px rgba(0,0,0,0.15);
}

.sidebar h2{
    margin-bottom:25px;
    font-size:22px;
    text-align:center;
    letter-spacing:0.5px;
    font-weight:700;
    color:#e3f2fd;
}

.sidebar a{
    display:flex;
    align-items:center;
    gap:10px;
    color:#fff;
    padding:12px 14px;
    text-decoration:none;
    margin-bottom:12px;
    border-radius:10px;
    background: rgba(255,255,255,0.08);
    transition: all 0.3s ease;
    font-weight:500;
}

/* Hover effect */
.sidebar a:hover{
    background: rgba(255,255,255,0.25);
    transform: translateX(6px);
}

/* Active page */
.sidebar a.active{
    background:#ffffff;
    color:#0d47a1;
    font-weight:bold;
}

/* ================= MAIN ================= */
.main{
    flex:1;
    padding:30px;
    overflow-x:auto;
}

/* TOP BAR */
.topbar{
    background:#fff;
    padding:16px 20px;
    border-radius:12px;
    margin-bottom:20px;
    font-size:22px;
    font-weight:600;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
    color:#1565c0;
}

/* CONTENT CARD AREA */
.content-box{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 3px 12px rgba(0,0,0,.06);
    transition: transform 0.2s ease;
}

.content-box:hover{
    transform: translateY(-3px);
}

/* BUTTON STYLE */
.btn{
    display:inline-block;
    padding:10px 18px;
    background:#1565c0;
    color:#fff;
    border-radius:8px;
    text-decoration:none;
    font-weight:500;
    transition: background 0.3s ease;
}

.btn:hover{
    background:#0d47a1;
}

/* MOBILE */
@media(max-width:768px){
    body{flex-direction:column;}
    .sidebar{
        width:100%;
        height:auto;
        position:relative;
    }
    .main{padding:15px;}
}
</style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
<h2>Agawo School System</h2>

<a href="{% url 'dashboard' %}" class="active">🏠 Dashboard</a>
<a href="{% url 'marks_entry' %}">📊 Marks Entry</a>
<a href="{% url 'library' %}">📚 Library</a>
<a href="{% url 'reports' %}">📄 Reports</a>
<a href="{% url 'fees' %}">💰 Fees</a>
<a href="{% url 'logout' %}">🚪 Logout</a>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

   

    {% block content %}
    <div class="content-box">
        <h2>Dashboard Overview</h2>
        <p>This is your main content area. You can add charts, tables, or any project details here.</p>
        <a href="#" class="btn">Explore More</a>
    </div>
    {% endblock %}

</div>

</body>
</html>
